name: Deploy Django App

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  IMAGE_TAG: django-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: false
          load: true
          tags: ${{ env.IMAGE_TAG }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image to tarball
        run: |
          mkdir -p ./docker-artifacts
          docker save ${{ env.IMAGE_TAG }}:${{ github.sha }} | gzip > ./docker-artifacts/django-app-${{ github.sha }}.tar.gz
          ls -lh ./docker-artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: docker-image
          path: ./docker-artifacts/
          retention-days: 1

      - name: Deploy to server via rsync
        if: github.ref == 'refs/heads/main'
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null

          # Transfer tarball
          rsync -avz --progress \
            -e "ssh -i ~/.ssh/deploy_key --port $DEPLOY_PORT" \
            ./docker-artifacts/django-app-${{ github.sha }}.tar.gz \
            $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/

          # Unpack and load image on remote server
          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST --port $DEPLOY_PORT << 'EOF'
            # set -e
            # echo "Unpacking and loading Docker image..."
            # cd ${{ secrets.DEPLOY_PATH }}
            # gunzip -c django-app-${{ github.sha }}.tar.gz | docker load

            # echo "Image loaded successfully!"
            # docker images | grep ${{ env.IMAGE_TAG }}

            # Clean up old tarball
            # rm -f django-app-${{ github.sha }}.tar.gz

            # Restart container with new image
            # docker-compose down || true
            # docker-compose up -d

            echo "Deployment complete!"
          EOF

          # Clean up deploy key
          rm ~/.ssh/deploy_key

