{% extends "base.html" %}
{% load static %}

{% block title %}Sensors{% endblock %}

{% block body %}
<style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000;
            color: #1adb1f;
        }
        #radarContainer {
            position: relative;
        }
        canvas {
            border: 2px solid #0adb1f;
            display: block;
            box-shadow: 0 0 20px rgba(10, 219, 31, 0.5);
        }
        #info {
            margin-top: 20px;
            font-size: 12px;
            max-width: 600px;
            background: rgba(10, 219, 31, 0.1);
            padding: 15px;
            border: 1px solid #0adb1f;
            border-radius: 4px;
        }
        .object-info {
            margin: 5px 0;
            padding: 3px;
        }
    </style>
    <div id="radarContainer">
        <canvas id="radar"></canvas>
    </div>
    <div id="info"></div><canvas id="radar"></canvas>
<script src="/static/js/sensors.js"></script>
{% endblock %}
