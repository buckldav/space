{% extends "base.html" %}

<style>
body {
  background: #140429 !important;
}</style>

{% block title %}404! {% endblock title %}
{% block content %}
  <h1>No page to be found here or there!</h1>
  <p>
    {% if exception %}
      {{ exception }}
    {% else %}
      This is not the page you were looking for.
    {% endif %}
  </p>

{% endblock content %}
