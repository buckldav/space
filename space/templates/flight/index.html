<!DOCTYPE html>
<html>
    <head>
	<title>Flight test page</title>
	<script src="https://cdn.jsdelivr.net/npm/p5@2.2.3/lib/p5.min.js"></script>
	<style>
	 /* * {
	    background-color: #292a24;
	    }
	    h1 {
	    color: #fffae2;
	    }
	    #p5window {
	    border-radius: 100px;
	    } */
	</style>
    </head>
    <body>
	<h1><marquee scrollamount="25" direction="right">This is a test page on /space/templates/flight!</marquee></h1>
	<div id="p5window">
	    <script>
	     function setup() {
		 createCanvas(windowWidth, windowHeight, WEBGL);
	     }

	     function draw() {
		 // Setups & styles
		 orbitControl();
		 clear();
		 background(51,52,46);
		 fill(44,44,44);
		 stroke(255,250,226);
		 strokeWeight(1);
		 // sum shapes!

		 push();
		 strokeWeight(0);
		 translate(0,4,0);
		 rotate(QUARTER_PI, [0,1,0]);
		 cone(25, -45, 5, 5);
		 pop();
		 //triangle(20, 25, -20, 25, 0, -20);
		 for (let i=0; i<4;i += 1) {
		     push();
		     if ((i % 2)==1) {
			 scale(-1,1);
		     }
		     rotate(HALF_PI * i, [0,1,0]);
		     beginShape(TRIANGLES);
		     fill(0,255,0);
		     vertex(20, 25, 20);
		     fill(255,0,0);
		     vertex(-20, 25, 20);
		     fill(0,0,255);
		     vertex(0, -20, 0);
		     endShape(CLOSE);
		     
		     pop();
		 }
		 push();
		 translate(50, 0, 0);
		 strokeWeight(0);
		 cylinder(5, 50);
		 pop();
	     }
	    </script>
	</div>
    </body>
</html>
